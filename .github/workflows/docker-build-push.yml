name: CI/CD Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  FRONT_IMAGE_NAME: docker-compose-test-front
  BACK_IMAGE_NAME: docker-compose-test-back

jobs:
  tests-front:
    name: Tests unitaires front
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./front

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests unitaires front
        run: npm test

  tests-back:
    name: Tests unitaires back
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./back

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lancer les tests unitaires back
        run: pytest

  lint:
    name: Lint front et back
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installer les dépendances front
        working-directory: ./front
        run: npm ci

      - name: Vérifier le lint front
        working-directory: ./front
        run: npm run lint

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer le lint Python
        working-directory: ./back
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Vérifier le lint back
        working-directory: ./back
        run: ruff check .

  docker-compose-check:
    name: Vérification Docker Compose
    runs-on: ubuntu-latest
    needs:
      - tests-front
      - tests-back
      - lint

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Vérifier le fichier docker-compose
        run: docker compose config

  build-and-push:
    name: Build et push des images Docker
    runs-on: ubuntu-latest
    needs:
      - docker-compose-check

    if: github.event_name == 'push'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_ID }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata for front
        id: meta-front
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_ID }}/${{ env.FRONT_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Extract Docker metadata for back
        id: meta-back
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_ID }}/${{ env.BACK_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push front image
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          labels: ${{ steps.meta-front.outputs.labels }}

      - name: Build and push back image
        uses: docker/build-push-action@v6
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: ${{ steps.meta-back.outputs.tags }}
          labels: ${{ steps.meta-back.outputs.labels }}